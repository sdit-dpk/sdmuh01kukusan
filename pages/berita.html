<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Berita — SD Muhammadiyah 01 Kukusan</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/global.css">

  <style>
    /* ── Peta kategori warna ──────────────────────────────── */
    :root {
      --kat-prestasi:   #1d4ed8;
      --kat-kegiatan:   #0369a1;
      --kat-program:    #15803d;
      --kat-pengumuman: #b45309;
    }

    /* ── Hero bar berita ─────────────────────────────────── */
    .berita-hero {
      background: linear-gradient(135deg, var(--blue-950) 0%, var(--blue-900) 100%);
      padding: 44px 0 40px;
    }
    .berita-hero h1 {
      font-family: var(--serif);
      font-size: clamp(24px, 3.5vw, 38px);
      font-weight: 700; color: white;
      margin: 0 0 10px;
    }
    .berita-hero p {
      font-size: 14.5px;
      color: rgba(255,255,255,.65);
      margin: 0;
    }

    /* ── Toolbar: filter + search ─────────────────────────── */
    .toolbar {
      background: white;
      border-bottom: 1px solid var(--gray-200);
      padding: 14px 0;
      position: sticky;
      top: 60px;
      z-index: 90;
    }
    .toolbar-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .filter-chips {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      flex: 1;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      border: 1.5px solid var(--gray-200);
      background: white;
      color: var(--gray-500);
      cursor: pointer;
      transition: all .18s;
      white-space: nowrap;
      user-select: none;
    }
    .chip:hover { border-color: var(--blue-500); color: var(--blue-700); }
    .chip.aktif {
      background: var(--blue-700);
      border-color: var(--blue-700);
      color: white;
    }
    .chip[data-kat="Prestasi"].aktif   { background: var(--kat-prestasi); border-color: var(--kat-prestasi); }
    .chip[data-kat="Kegiatan"].aktif   { background: var(--kat-kegiatan); border-color: var(--kat-kegiatan); }
    .chip[data-kat="Program"].aktif    { background: var(--kat-program);   border-color: var(--kat-program);   }
    .chip[data-kat="Pengumuman"].aktif { background: var(--kat-pengumuman);border-color: var(--kat-pengumuman);}

    .search-wrap {
      position: relative;
      flex-shrink: 0;
    }
    .search-wrap input {
      padding: 7px 14px 7px 36px;
      border: 1.5px solid var(--gray-200);
      border-radius: 20px;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      color: var(--blue-950);
      outline: none;
      width: 200px;
      transition: border-color .18s, width .25s;
      background: white;
    }
    .search-wrap input:focus {
      border-color: var(--blue-500);
      width: 240px;
    }
    .search-wrap::before {
      content: "🔍";
      position: absolute;
      left: 11px; top: 50%;
      transform: translateY(-50%);
      font-size: 13px;
      pointer-events: none;
    }

    /* ── Featured (artikel unggulan besar) ───────────────── */
    .featured-wrap { margin-bottom: 48px; }
    .featured-card {
      display: grid;
      grid-template-columns: 1fr 420px;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--gray-200);
      background: white;
      min-height: 340px;
    }
    @media (max-width: 820px) {
      .featured-card { grid-template-columns: 1fr; }
    }
    .featured-img {
      overflow: hidden;
      background: var(--blue-100);
    }
    .featured-img img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .4s;
    }
    .featured-card:hover .featured-img img { transform: scale(1.03); }
    .featured-body {
      padding: 36px 36px 32px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    @media (max-width: 820px) {
      .featured-img { height: 220px; }
      .featured-body { padding: 24px 22px; }
    }
    .kat-badge {
      display: inline-block;
      font-size: 11px; font-weight: 700;
      letter-spacing: .8px; text-transform: uppercase;
      border-radius: 3px; padding: 3px 9px;
      color: white; margin-bottom: 12px;
    }
    .kat-badge.Prestasi   { background: var(--kat-prestasi); }
    .kat-badge.Kegiatan   { background: var(--kat-kegiatan); }
    .kat-badge.Program    { background: var(--kat-program); }
    .kat-badge.Pengumuman { background: var(--kat-pengumuman); }

    .featured-body h2 {
      font-family: var(--serif);
      font-size: clamp(20px, 2.5vw, 26px);
      font-weight: 700; color: var(--blue-950);
      line-height: 1.3; margin: 0 0 12px;
    }
    .featured-body .ringkasan {
      font-size: 14.5px; color: var(--gray-500);
      line-height: 1.7; margin: 0 0 20px;
      flex: 1;
    }
    .article-meta {
      display: flex; gap: 14px; align-items: center;
      font-size: 12.5px; color: var(--gray-400);
      margin-bottom: 20px;
    }
    .article-meta span { display: flex; gap: 5px; align-items: center; }

    /* ── Grid artikel biasa ───────────────────────────────── */
    .berita-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 22px;
    }
    .berita-card {
      background: white;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      overflow: hidden;
      transition: box-shadow .2s, transform .2s;
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: inherit;
    }
    .berita-card:hover {
      box-shadow: 0 6px 28px rgba(13,49,114,.12);
      transform: translateY(-3px);
    }
    .berita-card-img {
      height: 190px;
      overflow: hidden;
      background: var(--blue-100);
      flex-shrink: 0;
    }
    .berita-card-img img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform .4s;
    }
    .berita-card:hover .berita-card-img img { transform: scale(1.05); }
    .berita-card-body {
      padding: 20px 20px 18px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .berita-card-body h3 {
      font-family: var(--serif);
      font-size: 17px; font-weight: 700;
      color: var(--blue-950); line-height: 1.4;
      margin: 0 0 10px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .berita-card-body p {
      font-size: 13px; color: var(--gray-500);
      line-height: 1.6; margin: 0 0 14px;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .berita-card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--gray-400);
      border-top: 1px solid var(--gray-200);
      padding-top: 12px;
      margin-top: auto;
    }
    .berita-card-footer a {
      font-size: 12.5px; font-weight: 600;
      color: var(--blue-700); text-decoration: none;
    }
    .berita-card-footer a:hover { text-decoration: underline; }

    /* ── Empty state ──────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 64px 20px;
      color: var(--gray-400);
    }
    .empty-state .ikon { font-size: 48px; margin-bottom: 16px; }
    .empty-state p { font-size: 15px; margin: 0; }

    /* ── Jumlah hasil ─────────────────────────────────────── */
    .hasil-info {
      font-size: 13.5px;
      color: var(--gray-400);
      margin-bottom: 20px;
    }
    .hasil-info strong { color: var(--blue-900); }
  </style>
</head>

<body data-page="berita">

  <a class="skip-link" href="#page-content">Langsung ke konten</a>

  <div class="topbar">
    <div class="topbar-inner">
      <div class="topbar-left" id="topbar-kontak"></div>
      <div class="topbar-right" id="topbar-ta"></div>
    </div>
  </div>

  <header class="header">
    <div class="header-inner">
      <a href="../" class="logo-area">
        <div class="logo-mark">
          <svg viewBox="0 0 40 40">
            <text x="20" y="28" text-anchor="middle"
              font-family="Georgia,serif" font-size="18"
              font-weight="bold" fill="white">SD</text>
          </svg>
        </div>
        <div class="logo-text">
          <strong id="header-nama"></strong>
          <small  id="header-tagline"></small>
        </div>
      </a>
      <nav id="nav-menu" aria-label="Navigasi utama"></nav>
      <button class="hamburger" id="hamburger"
        aria-label="Buka/tutup menu" aria-expanded="false">☰</button>
    </div>
  </header>

  <!-- Hero -->
  <div class="berita-hero">
    <div class="container">
      <div class="section-tag" style="color:var(--gold);margin-bottom:10px;">✦ Ruang Informasi</div>
      <h1>Berita &amp; Kegiatan Sekolah</h1>
      <p>Informasi terkini seputar prestasi, program, dan kegiatan SD Muhammadiyah 01 Kukusan.</p>
    </div>
  </div>

  <!-- Breadcrumb -->
  <nav aria-label="Breadcrumb" style="background:var(--surface);border-bottom:1px solid var(--gray-200);padding:10px 0;font-size:13px;">
    <div class="container" style="display:flex;gap:6px;align-items:center;color:var(--gray-400);">
      <a href="../" style="color:var(--blue-700);">Beranda</a>
      <span>›</span>
      <span style="color:var(--gray-600);">Berita</span>
    </div>
  </nav>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="toolbar-inner">
      <div class="filter-chips" id="filter-chips">
        <button class="chip aktif" data-kat="Semua">Semua</button>
        <button class="chip" data-kat="Prestasi">🏆 Prestasi</button>
        <button class="chip" data-kat="Kegiatan">🎨 Kegiatan</button>
        <button class="chip" data-kat="Program">📖 Program</button>
        <button class="chip" data-kat="Pengumuman">📢 Pengumuman</button>
      </div>
      <div class="search-wrap">
        <input type="search" id="cari-input"
          placeholder="Cari berita…"
          aria-label="Cari berita">
      </div>
    </div>
  </div>

  <!-- Konten -->
  <main id="page-content">
    <section class="section">
      <div class="container">

        <!-- Featured artikel -->
        <div class="featured-wrap" id="featured-wrap"></div>

        <!-- Semua artikel -->
        <div class="hasil-info" id="hasil-info"></div>
        <div class="berita-grid" id="berita-grid"></div>

      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-grid">
        <div class="footer-brand">
          <div class="logo-area">
            <div class="logo-mark">
              <svg viewBox="0 0 40 40">
                <text x="20" y="28" text-anchor="middle"
                  font-family="Georgia,serif" font-size="18"
                  font-weight="bold" fill="white">SD</text>
              </svg>
            </div>
            <div class="logo-text">
              <strong id="footer-nama"></strong>
              <small  id="footer-akreditasi"></small>
            </div>
          </div>
          <p id="footer-deskripsi"></p>
        </div>
        <div class="footer-col"><h5>Tautan Cepat</h5><ul id="footer-links-utama"></ul></div>
        <div class="footer-col"><h5>Portal</h5><ul id="footer-links-portal"></ul></div>
        <div class="footer-col"><h5>Kontak Kami</h5><div class="footer-contact" id="footer-kontak"></div></div>
      </div>
      <div class="footer-bottom">
        <p id="footer-copy"></p>
        <p><a href="kebijakan-privasi.html">Kebijakan Privasi</a></p>
      </div>
    </div>
  </footer>

  <script src="../js/data.js"></script>
  <script src="../js/components.js"></script>
  <script>
  (function () {
    const semua   = DATA.berita;
    let katAktif  = 'Semua';
    let query     = '';

    /* ── helpers ────────────────────────────────────────── */
    function urlArtikel(id) {
      return 'berita-detail.html?id=' + id;
    }
    function katBadgeHTML(kat) {
      return `<span class="kat-badge ${kat}">${kat}</span>`;
    }
    function metaHTML(a) {
      return `<div class="article-meta">
        <span>📅 ${a.tanggal}</span>
        <span>✍️ ${a.penulis}</span>
        <span>👁 ${a.dibaca} dibaca</span>
      </div>`;
    }

    /* ── filter ─────────────────────────────────────────── */
    function filtered() {
      return semua.filter(a => {
        const cocokKat = katAktif === 'Semua' || a.kategori === katAktif;
        const cocokQ   = query === '' ||
          a.judul.toLowerCase().includes(query) ||
          a.ringkasan.toLowerCase().includes(query) ||
          (a.tags || []).some(t => t.includes(query));
        return cocokKat && cocokQ;
      });
    }

    /* ── render featured ─────────────────────────────────── */
    function renderFeatured(list) {
      const wrap = document.getElementById('featured-wrap');
      const top  = list.find(a => a.unggulan) || list[0];
      if (!top) { wrap.innerHTML = ''; return; }
      wrap.innerHTML = `
        <a href="${urlArtikel(top.id)}" class="featured-card" style="display:grid;text-decoration:none;color:inherit;">
          <div class="featured-body">
            ${katBadgeHTML(top.kategori)}
            <h2>${top.judul}</h2>
            <p class="ringkasan">${top.ringkasan}</p>
            ${metaHTML(top)}
            <span class="read-more">Baca selengkapnya →</span>
          </div>
          <div class="featured-img">
            <img src="${top.foto}" alt="${top.fotoAlt || top.judul}" loading="lazy">
          </div>
        </a>`;
    }

    /* ── render grid ─────────────────────────────────────── */
    function renderGrid(list) {
      const grid = document.getElementById('berita-grid');
      const info = document.getElementById('hasil-info');

      /* keluarkan featured dari grid supaya tidak dobel */
      const top  = list.find(a => a.unggulan) || list[0];
      const rest = list.filter(a => a !== top);

      info.innerHTML = rest.length > 0
        ? `Menampilkan <strong>${rest.length}</strong> artikel`
        : '';

      if (rest.length === 0) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1;">
            <div class="ikon">🔍</div>
            <p>Tidak ada berita yang cocok.<br>
               Coba kata kunci lain atau ubah filter kategori.</p>
          </div>`;
        return;
      }

      grid.innerHTML = rest.map(a => `
        <a href="${urlArtikel(a.id)}" class="berita-card">
          <div class="berita-card-img">
            <img src="${a.foto}" alt="${a.fotoAlt || a.judul}" loading="lazy">
          </div>
          <div class="berita-card-body">
            ${katBadgeHTML(a.kategori)}
            <h3>${a.judul}</h3>
            <p>${a.ringkasan}</p>
            <div class="berita-card-footer">
              <span>📅 ${a.tanggal}</span>
              <span>Baca →</span>
            </div>
          </div>
        </a>`).join('');
    }

    /* ── render semua ─────────────────────────────────────── */
    function render() {
      const list = filtered();
      renderFeatured(list);
      renderGrid(list);
    }

    /* ── event: filter chips ─────────────────────────────── */
    document.getElementById('filter-chips')
      .addEventListener('click', function (e) {
        const chip = e.target.closest('.chip');
        if (!chip) return;
        katAktif = chip.dataset.kat;
        document.querySelectorAll('.chip').forEach(c => {
          c.classList.toggle('aktif', c === chip);
        });
        render();
      });

    /* ── event: search ───────────────────────────────────── */
    let debounce;
    document.getElementById('cari-input')
      .addEventListener('input', function () {
        clearTimeout(debounce);
        debounce = setTimeout(() => {
          query = this.value.trim().toLowerCase();
          render();
        }, 220);
      });

    /* ── init ─────────────────────────────────────────────── */
    render();
  })();
  </script>

</body>
</html>
