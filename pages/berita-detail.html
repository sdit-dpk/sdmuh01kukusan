<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Title diisi JS -->
  <title>Berita — SD Muhammadiyah 01 Kukusan</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/global.css">

  <style>
    :root {
      --kat-prestasi:   #1d4ed8;
      --kat-kegiatan:   #0369a1;
      --kat-program:    #15803d;
      --kat-pengumuman: #b45309;
    }

    /* ── Layout dua kolom ─────────────────────────────────── */
    .artikel-layout {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 48px;
      align-items: start;
    }
    @media (max-width: 860px) {
      .artikel-layout { grid-template-columns: 1fr; }
      .artikel-sidebar { order: -1; }
    }

    /* ── Hero foto artikel ────────────────────────────────── */
    .artikel-hero-img {
      width: 100%;
      aspect-ratio: 16 / 7;
      object-fit: cover;
      border-radius: var(--radius);
      display: block;
      margin-bottom: 32px;
      background: var(--blue-100);
    }

    /* ── Badge kategori ───────────────────────────────────── */
    .kat-badge {
      display: inline-block;
      font-size: 11px; font-weight: 700;
      letter-spacing: .8px; text-transform: uppercase;
      border-radius: 3px; padding: 3px 9px;
      color: white; margin-bottom: 14px;
    }
    .kat-badge.Prestasi   { background: var(--kat-prestasi); }
    .kat-badge.Kegiatan   { background: var(--kat-kegiatan); }
    .kat-badge.Program    { background: var(--kat-program); }
    .kat-badge.Pengumuman { background: var(--kat-pengumuman); }

    /* ── Judul artikel ────────────────────────────────────── */
    .artikel-judul {
      font-family: var(--serif);
      font-size: clamp(24px, 3.5vw, 36px);
      font-weight: 700;
      color: var(--blue-950);
      line-height: 1.3;
      margin: 0 0 16px;
    }

    /* ── Meta: tanggal, penulis, dibaca ──────────────────── */
    .artikel-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      font-size: 13px;
      color: var(--gray-400);
      padding: 14px 0;
      border-top: 1px solid var(--gray-200);
      border-bottom: 1px solid var(--gray-200);
      margin-bottom: 28px;
    }
    .artikel-meta span { display: flex; gap: 6px; align-items: center; }

    /* ── Konten artikel ───────────────────────────────────── */
    .artikel-konten p {
      font-size: 16px;
      line-height: 1.85;
      color: var(--gray-600);
      margin: 0 0 22px;
    }
    .artikel-konten p:first-child {
      font-size: 17.5px;
      color: var(--gray-700);
      font-weight: 500;
    }
    .artikel-konten p:last-child { margin-bottom: 0; }

    /* ── Tags ─────────────────────────────────────────────── */
    .artikel-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--gray-200);
    }
    .tag-pill {
      display: inline-block;
      font-size: 12px;
      color: var(--blue-700);
      background: var(--blue-50);
      border: 1px solid var(--blue-100);
      border-radius: 20px;
      padding: 4px 12px;
      text-decoration: none;
      cursor: pointer;
    }
    .tag-pill:hover { background: var(--blue-100); }

    /* ── Navigasi artikel (prev/next) ─────────────────────── */
    .artikel-nav {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 40px;
    }
    .artikel-nav-card {
      display: block;
      background: white;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 16px 18px;
      text-decoration: none;
      color: inherit;
      transition: box-shadow .18s;
    }
    .artikel-nav-card:hover { box-shadow: 0 4px 16px rgba(13,49,114,.1); }
    .artikel-nav-card .arah {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: var(--gray-400); margin-bottom: 6px;
    }
    .artikel-nav-card .nav-judul {
      font-family: var(--serif);
      font-size: 15px; font-weight: 700;
      color: var(--blue-900); line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .artikel-nav-card.next { text-align: right; }
    .artikel-nav-card.empty { pointer-events: none; opacity: 0; }

    /* ── Sidebar ──────────────────────────────────────────── */
    .sidebar-box {
      background: white;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 24px;
    }
    .sidebar-head {
      background: var(--blue-900);
      color: white;
      padding: 12px 18px;
      font-family: var(--serif);
      font-size: 15px; font-weight: 700;
    }
    .sidebar-list { list-style: none; padding: 0; margin: 0; }
    .sidebar-list li {
      border-bottom: 1px solid var(--gray-200);
    }
    .sidebar-list li:last-child { border-bottom: none; }
    .sidebar-list a {
      display: flex;
      gap: 12px;
      padding: 12px 16px;
      text-decoration: none;
      color: inherit;
      transition: background .15s;
      align-items: flex-start;
    }
    .sidebar-list a:hover { background: var(--blue-50); }
    .sidebar-list .si-thumb {
      width: 64px; height: 48px;
      border-radius: 6px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--blue-100);
    }
    .sidebar-list .si-info h4 {
      font-size: 13px; font-weight: 600;
      color: var(--blue-950); line-height: 1.4;
      margin: 0 0 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .sidebar-list .si-info span {
      font-size: 11.5px; color: var(--gray-400);
    }

    /* ── Bagikan ──────────────────────────────────────────── */
    .share-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--gray-200);
    }
    .share-bar span {
      font-size: 13px; font-weight: 600; color: var(--gray-500);
    }
    .share-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 16px;
      border-radius: 20px;
      font-size: 13px; font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      border: 1.5px solid var(--gray-200);
      background: white;
      color: var(--gray-600);
      transition: all .18s;
    }
    .share-btn:hover { border-color: var(--blue-500); color: var(--blue-700); }
    .share-btn.wa  { border-color: #25d366; color: #25d366; }
    .share-btn.wa:hover  { background: #25d366; color: white; }
    .share-btn.copy:hover { background: var(--blue-700); color: white; border-color: var(--blue-700); }

    /* ── 404 tidak ditemukan ─────────────────────────────── */
    .not-found {
      text-align: center;
      padding: 80px 20px;
      color: var(--gray-400);
    }
    .not-found .ikon { font-size: 56px; margin-bottom: 20px; }
    .not-found h2 { font-family: var(--serif); color: var(--blue-950); margin: 0 0 12px; }
    .not-found p  { font-size: 15px; margin: 0 0 24px; }

    /* ── Toast notifikasi copy ────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--blue-900); color: white;
      padding: 10px 22px; border-radius: 20px;
      font-size: 13px; font-weight: 500;
      opacity: 0; transition: opacity .25s, transform .25s;
      pointer-events: none; z-index: 999;
      white-space: nowrap;
    }
    .toast.tampil { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>

<body data-page="berita">

  <a class="skip-link" href="#page-content">Langsung ke konten</a>

  <div class="topbar">
    <div class="topbar-inner">
      <div class="topbar-left" id="topbar-kontak"></div>
      <div class="topbar-right" id="topbar-ta"></div>
    </div>
  </div>

  <header class="header">
    <div class="header-inner">
      <a href="../" class="logo-area">
        <div class="logo-mark">
          <svg viewBox="0 0 40 40">
            <text x="20" y="28" text-anchor="middle"
              font-family="Georgia,serif" font-size="18"
              font-weight="bold" fill="white">SD</text>
          </svg>
        </div>
        <div class="logo-text">
          <strong id="header-nama"></strong>
          <small  id="header-tagline"></small>
        </div>
      </a>
      <nav id="nav-menu" aria-label="Navigasi utama"></nav>
      <button class="hamburger" id="hamburger"
        aria-label="Buka/tutup menu" aria-expanded="false">☰</button>
    </div>
  </header>

  <!-- Breadcrumb — diisi JS -->
  <nav aria-label="Breadcrumb" id="breadcrumb-bar"
    style="background:var(--surface);border-bottom:1px solid var(--gray-200);padding:10px 0;font-size:13px;">
    <div class="container" style="display:flex;gap:6px;align-items:center;color:var(--gray-400);">
      <a href="../" style="color:var(--blue-700);">Beranda</a>
      <span>›</span>
      <a href="berita.html" style="color:var(--blue-700);">Berita</a>
      <span>›</span>
      <span id="breadcrumb-judul" style="color:var(--gray-600);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:300px;"></span>
    </div>
  </nav>

  <!-- Konten utama -->
  <main id="page-content">
    <section class="section">
      <div class="container">
        <div id="artikel-wrap"></div>
      </div>
    </section>
  </main>

  <!-- Toast -->
  <div class="toast" id="toast">✅ Tautan berhasil disalin!</div>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-grid">
        <div class="footer-brand">
          <div class="logo-area">
            <div class="logo-mark">
              <svg viewBox="0 0 40 40">
                <text x="20" y="28" text-anchor="middle"
                  font-family="Georgia,serif" font-size="18"
                  font-weight="bold" fill="white">SD</text>
              </svg>
            </div>
            <div class="logo-text">
              <strong id="footer-nama"></strong>
              <small  id="footer-akreditasi"></small>
            </div>
          </div>
          <p id="footer-deskripsi"></p>
        </div>
        <div class="footer-col"><h5>Tautan Cepat</h5><ul id="footer-links-utama"></ul></div>
        <div class="footer-col"><h5>Portal</h5><ul id="footer-links-portal"></ul></div>
        <div class="footer-col"><h5>Kontak Kami</h5><div class="footer-contact" id="footer-kontak"></div></div>
      </div>
      <div class="footer-bottom">
        <p id="footer-copy"></p>
        <p><a href="kebijakan-privasi.html">Kebijakan Privasi</a></p>
      </div>
    </div>
  </footer>

  <script src="../js/data.js"></script>
  <script src="../js/components.js"></script>
  <script>
  (function () {
    /* ── Baca ?id= dari URL ──────────────────────────────── */
    const params = new URLSearchParams(window.location.search);
    const id     = params.get('id');
    const semua  = DATA.berita;
    const idx    = semua.findIndex(a => a.id === id);
    const artikel = idx >= 0 ? semua[idx] : null;

    const wrap = document.getElementById('artikel-wrap');

    /* ── Tidak ditemukan ─────────────────────────────────── */
    if (!artikel) {
      wrap.innerHTML = `
        <div class="not-found">
          <div class="ikon">📰</div>
          <h2>Artikel Tidak Ditemukan</h2>
          <p>Artikel yang Anda cari tidak tersedia atau telah dihapus.</p>
          <a href="berita.html" class="btn btn-primary">← Kembali ke Daftar Berita</a>
        </div>`;
      return;
    }

    /* ── Update tab title & breadcrumb ──────────────────── */
    document.title = artikel.judul + ' — SD Muhammadiyah 01 Kukusan';
    document.getElementById('breadcrumb-judul').textContent = artikel.judul;

    /* ── Artikel terkait (same kategori, bukan diri sendiri) */
    const terkait = semua
      .filter(a => a.id !== artikel.id && a.kategori === artikel.kategori)
      .slice(0, 4);

    /* ── Artikel populer (sort by dibaca) ────────────────── */
    const populer = [...semua]
      .filter(a => a.id !== artikel.id)
      .sort((a, b) => parseInt(b.dibaca) - parseInt(a.dibaca))
      .slice(0, 4);

    /* ── Helper: kartu sidebar ───────────────────────────── */
    function sidebarItem(a) {
      return `
        <li>
          <a href="berita-detail.html?id=${a.id}">
            <img class="si-thumb" src="${a.foto}" alt="${a.fotoAlt || a.judul}" loading="lazy">
            <div class="si-info">
              <h4>${a.judul}</h4>
              <span>📅 ${a.tanggal}</span>
            </div>
          </a>
        </li>`;
    }

    /* ── Prev / Next ─────────────────────────────────────── */
    const prev = idx > 0          ? semua[idx - 1] : null;
    const next = idx < semua.length - 1 ? semua[idx + 1] : null;

    function navCard(a, arah) {
      if (!a) return `<div class="artikel-nav-card empty"></div>`;
      const label = arah === 'prev' ? '← Artikel Sebelumnya' : 'Artikel Berikutnya →';
      return `
        <a href="berita-detail.html?id=${a.id}"
           class="artikel-nav-card ${arah === 'next' ? 'next' : ''}">
          <div class="arah">${label}</div>
          <div class="nav-judul">${a.judul}</div>
        </a>`;
    }

    /* ── Bagikan via WhatsApp ─────────────────────────────── */
    const urlHalaman = encodeURIComponent(window.location.href);
    const teksWA     = encodeURIComponent(
      '📰 *' + artikel.judul + '*\n\n' +
      artikel.ringkasan + '\n\nBaca selengkapnya: ' +
      window.location.href
    );

    /* ── Render utama ────────────────────────────────────── */
    wrap.innerHTML = `
      <div class="artikel-layout">

        <!-- Kolom kiri: artikel -->
        <article>
          <img class="artikel-hero-img"
            src="${artikel.foto}"
            alt="${artikel.fotoAlt || artikel.judul}">

          <span class="kat-badge ${artikel.kategori}">${artikel.kategori}</span>
          <h1 class="artikel-judul">${artikel.judul}</h1>

          <div class="artikel-meta">
            <span>📅 ${artikel.tanggal}</span>
            <span>✍️ ${artikel.penulis}</span>
            <span>👁 ${artikel.dibaca} kali dibaca</span>
          </div>

          <div class="artikel-konten" id="artikel-konten"></div>

          <!-- Tags -->
          <div class="artikel-tags">
            <span style="font-size:12px;font-weight:600;color:var(--gray-400);">Tags:</span>
            ${(artikel.tags || []).map(t =>
              `<span class="tag-pill">#${t}</span>`
            ).join('')}
          </div>

          <!-- Bagikan -->
          <div class="share-bar">
            <span>Bagikan:</span>
            <a class="share-btn wa"
               href="https://wa.me/?text=${teksWA}"
               target="_blank" rel="noopener">
              💬 WhatsApp
            </a>
            <button class="share-btn copy" id="btn-copy">
              🔗 Salin Tautan
            </button>
          </div>

          <!-- Navigasi prev/next -->
          <div class="artikel-nav">
            ${navCard(prev, 'prev')}
            ${navCard(next, 'next')}
          </div>
        </article>

        <!-- Kolom kanan: sidebar -->
        <aside class="artikel-sidebar">

          ${terkait.length > 0 ? `
          <div class="sidebar-box">
            <div class="sidebar-head">📌 Artikel Terkait</div>
            <ul class="sidebar-list">
              ${terkait.map(sidebarItem).join('')}
            </ul>
          </div>` : ''}

          <div class="sidebar-box">
            <div class="sidebar-head">🔥 Paling Banyak Dibaca</div>
            <ul class="sidebar-list">
              ${populer.map(sidebarItem).join('')}
            </ul>
          </div>

          <div class="sidebar-box">
            <div class="sidebar-head">📂 Kategori</div>
            <ul class="sidebar-list">
              ${['Prestasi','Kegiatan','Program','Pengumuman'].map(k => {
                const n = semua.filter(a => a.kategori === k).length;
                return `<li><a href="berita.html?kat=${k}" style="justify-content:space-between;">
                  <span>${k}</span>
                  <span style="background:var(--blue-50);color:var(--blue-700);
                    border-radius:12px;padding:2px 10px;font-size:12px;font-weight:700;">
                    ${n}
                  </span>
                </a></li>`;
              }).join('')}
            </ul>
          </div>

          <a href="berita.html" class="btn btn-outline"
            style="display:block;text-align:center;margin-top:4px;">
            ← Semua Berita
          </a>

        </aside>
      </div>`;

    /* ── Isi paragraf konten ─────────────────────────────── */
    const kontenEl = document.getElementById('artikel-konten');
    kontenEl.innerHTML = (artikel.konten || [artikel.ringkasan])
      .map(p => `<p>${p}</p>`).join('');

    /* ── Tombol salin tautan ─────────────────────────────── */
    document.getElementById('btn-copy').addEventListener('click', function () {
      navigator.clipboard.writeText(window.location.href).then(() => {
        const toast = document.getElementById('toast');
        toast.classList.add('tampil');
        setTimeout(() => toast.classList.remove('tampil'), 2400);
      });
    });

  })();
  </script>

</body>
</html>
